[graph]
targets = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"  # intra-workspace path deps have no version by design

[advisories]
ignore = [
    # paste is a transitive dep of cryptoki; RUSTSEC-2024-0436 flags it as
    # unmaintained but it has no known vulnerability — acceptable for now.
    "RUSTSEC-2024-0436",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
