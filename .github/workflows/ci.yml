name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install rustup (no-op on real GitHub runners)
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
            echo "${HOME}/.cargo/bin" >> "$GITHUB_PATH"
          fi

      - name: Pin Rust toolchain from rust-toolchain.toml
        run: rustup show

      - name: Install cargo-deny
        run: |
          tag=$(curl -sL "https://api.github.com/repos/EmbarkStudios/cargo-deny/releases/latest" \
                | grep '"tag_name"' | cut -d'"' -f4)
          tmp=$(mktemp -d)
          curl -sL --fail \
            "https://github.com/EmbarkStudios/cargo-deny/releases/download/${tag}/cargo-deny-${tag}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C "$tmp"
          mv "$tmp"/cargo-deny-*/cargo-deny /usr/local/bin/cargo-deny
          rm -rf "$tmp"

      - name: Install SoftHSM2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y softhsm2
          echo "SOFTHSM2_MODULE=/usr/lib/softhsm/libsofthsm2.so" >> "$GITHUB_ENV"

      - name: Export SoftHSM2 conf path
        # init_test_token() writes the conf file; we just need SOFTHSM2_CONF set in the
        # environment so libsofthsm2.so knows where to find it at runtime.
        run: |
          echo "SOFTHSM2_CONF=$(pwd)/target/test-softhsm/softhsm2.conf" >> "$GITHUB_ENV"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        # --test-threads=1: init_test_token() rm-rf's and recreates the shared
        # target/test-softhsm/ directory; parallel threads would stomp each other.
        run: cargo test --all -- --test-threads=1

      - name: cargo deny
        run: cargo deny check

  nix:
    name: Nix build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: nix build anodize-ceremony
        run: nix build .#anodize-ceremony

      - name: nix build anodize (CLI)
        run: nix build .#anodize

      - name: nix flake check
        run: nix flake check --no-build

  release:
    name: Release ISO images
    runs-on: ubuntu-latest
    needs: [check, nix]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build production ISO
        run: nix build .#iso --out-link prod-result

      - name: Build dev ISO
        run: nix build .#dev-iso --out-link dev-result

      - name: Stage ISOs for upload
        id: stage
        run: |
          tag="${GITHUB_REF_NAME}"
          prod_src=$(ls prod-result/iso/*.iso | head -1)
          dev_src=$(ls dev-result/iso/*.iso | head -1)
          prod_out="anodize-${tag}.iso"
          dev_out="anodize-dev-${tag}.iso"
          cp "$prod_src" "$prod_out"
          cp "$dev_src"  "$dev_out"
          echo "prod=$prod_out" >> "$GITHUB_OUTPUT"
          echo "dev=$dev_out"   >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-') }}
          files: |
            ${{ steps.stage.outputs.prod }}
            ${{ steps.stage.outputs.dev }}
